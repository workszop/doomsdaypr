  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags - manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin - blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec - re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d0-9fb1-361c0f4cc372\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"032a083c-1a63-48ee-b8d2-6ab2b6d2a6bd\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"78a03305-8b70-4685-b72c-0496e247b6a4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"57674b32-dbd2-43e9-bc8b-24621e66ec8f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bg:      #0A0B0D;\n    --bg-1:    #101216;\n    --bg-2:    #15181D;\n    --line:    rgba(236,238,240,0.10);\n    --line-2:  rgba(236,238,240,0.18);\n    --ink:     #ECEEF0;\n    --ink-dim: #8A9099;\n    --ink-mut: #5C636B;\n    --red:     #FF3A3F;\n    --red-deep:#C71F2B;\n    --amber:   #F5B23A;\n    --teal:    #2FD3A5;\n    --display: 'Archivo', system-ui, sans-serif;\n    --sans:    'Instrument Sans', system-ui, sans-serif;\n    --mono:    'JetBrains Mono', ui-monospace, monospace;\n  }\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body {\n    margin: 0; background: var(--bg); color: var(--ink);\n    font-family: var(--sans); -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n  a { color: inherit; text-decoration: none; }\n  ::selection { background: var(--red); color: #fff; }\n\n  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 48px; }\n  .display { font-family: var(--display); font-weight: 800; letter-spacing: -0.02em; line-height: 0.98; margin: 0; }\n  em.hot { font-style: normal; color: var(--red); }\n  .mono-label {\n    font-family: var(--mono); font-size: 13px; letter-spacing: .22em;\n    text-transform: uppercase; color: var(--red);\n    display: inline-flex; align-items: center; gap: 14px;\n  }\n  .mono-label::before { content: \"\"; width: 26px; height: 2px; background: var(--red); }\n\n  /* \u2500\u2500 Logo \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .logo { display: inline-flex; align-items: center; gap: 12px; color: var(--ink); }\n  .logo svg { width: 30px; height: 30px; flex: none; }\n  .logo .word {\n    font-family: var(--display); font-weight: 800; font-size: 20px;\n    letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 8px;\n  }\n  .logo .pr {\n    font-family: var(--mono); font-weight: 700; font-size: 11px;\n    letter-spacing: .1em; color: var(--bg); background: var(--red);\n    padding: 3px 6px; border-radius: 4px;\n  }\n\n  /* \u2500\u2500 Nav \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  nav {\n    position: sticky; top: 0; z-index: 50;\n    backdrop-filter: blur(14px);\n    background: rgba(10,11,13,0.72);\n    border-bottom: 1px solid var(--line);\n  }\n  nav .wrap { display: flex; align-items: center; justify-content: space-between; height: 76px; }\n  .nav-links { display: flex; gap: 38px; font-size: 15px; color: var(--ink-dim); }\n  .nav-links a { transition: color .15s; }\n  .nav-links a:hover { color: var(--ink); }\n  .threat {\n    font-family: var(--mono); font-size: 12px; letter-spacing: .12em;\n    text-transform: uppercase; color: var(--red);\n    display: flex; align-items: center; gap: 8px;\n  }\n  .threat .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: pulse 1.4s ease-in-out infinite; }\n  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity:.35; transform: scale(.7);} }\n  .btn {\n    font-family: var(--mono); font-size: 13px; letter-spacing: .08em; text-transform: uppercase;\n    background: var(--red); color: #fff; padding: 13px 22px; border-radius: 7px;\n    font-weight: 700; transition: transform .15s, background .15s; white-space: nowrap;\n  }\n  .btn:hover { background: #ff5054; transform: translateY(-2px); }\n  .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line-2); }\n  .btn.ghost:hover { border-color: var(--red); color: var(--red); background: transparent; }\n\n  @media (max-width: 880px) { .nav-links, .threat { display: none; } }\n\n  /* \u2500\u2500 Grid backdrop helper \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .gridbg { position: relative; }\n  .gridbg::before {\n    content:\"\"; position:absolute; inset:0; pointer-events:none; z-index:0;\n    background-image:\n      linear-gradient(var(--line) 1px, transparent 1px),\n      linear-gradient(90deg, var(--line) 1px, transparent 1px);\n    background-size: 64px 64px;\n    -webkit-mask-image: radial-gradient(circle at 50% 30%, #000 20%, transparent 72%);\n            mask-image: radial-gradient(circle at 50% 30%, #000 20%, transparent 72%);\n    opacity: .55;\n  }\n  .gridbg > * { position: relative; z-index: 1; }\n\n  /* \u2500\u2500 Hero \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .hero { min-height: calc(100vh - 76px - 58px); display: flex; align-items: center; padding: 60px 0; overflow: hidden; }\n  .hero::after {\n    content:\"\"; position:absolute; top:-300px; right:-200px; width:900px; height:900px;\n    border-radius:50%; background: radial-gradient(circle, rgba(255,58,63,.18), transparent 60%);\n    pointer-events:none; z-index:0;\n  }\n  .hero > .wrap { width: 100%; }\n  .hero .inner { display: grid; grid-template-columns: 1.25fr 0.75fr; gap: 60px; align-items: center; }\n  .hero h1 { font-size: clamp(48px, 7vw, 104px); }\n  .hero .sub { font-size: clamp(18px, 2vw, 23px); line-height: 1.5; color: var(--ink-dim); max-width: 44ch; margin: 30px 0 0; }\n  .hero .cta-row { margin-top: 42px; display: flex; gap: 16px; flex-wrap: wrap; }\n  .hero-clock { width: 100%; max-width: 380px; justify-self: center; }\n  @media (max-width: 980px) {\n    .hero .inner { grid-template-columns: 1fr; }\n    .hero-clock { display: none; }\n  }\n\n  /* \u2500\u2500 News crawl \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .crawl {\n    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);\n    background: var(--bg-1); overflow: hidden; white-space: nowrap;\n    display: flex;\n  }\n  .crawl .track {\n    display: inline-flex; align-items: center; gap: 0;\n    animation: scroll-x 38s linear infinite; flex: none;\n  }\n  .crawl:hover .track { animation-play-state: paused; }\n  .crawl .item {\n    font-family: var(--mono); font-size: 14px; letter-spacing: .08em; text-transform: uppercase;\n    color: var(--ink-dim); padding: 18px 0; display: inline-flex; align-items: center;\n  }\n  .crawl .item b { color: var(--ink); font-weight: 700; }\n  .crawl .sep { color: var(--red); margin: 0 26px; }\n  @keyframes scroll-x { from { transform: translateX(0);} to { transform: translateX(-50%);} }\n  @media (prefers-reduced-motion: reduce) { .crawl .track { animation: none; } }\n\n  /* \u2500\u2500 Section scaffold \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  section { padding: 110px 0; position: relative; }\n  .section-head { max-width: 52ch; margin-bottom: 60px; }\n  .section-head h2 { font-size: clamp(34px, 4.6vw, 60px); margin-top: 22px; }\n  .section-head p { font-size: 20px; line-height: 1.55; color: var(--ink-dim); margin: 24px 0 0; }\n\n  /* \u2500\u2500 About \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .about { border-top: 1px solid var(--line); }\n  .about .lead {\n    font-family: var(--display); font-weight: 600; letter-spacing: -0.01em;\n    font-size: clamp(26px, 3.4vw, 42px); line-height: 1.18; max-width: 22ch;\n  }\n  .about .grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 64px; align-items: center; }\n  .about .body { font-size: 20px; line-height: 1.6; color: var(--ink-dim); }\n  .about .body strong { color: var(--ink); font-weight: 600; }\n  @media (max-width: 900px) { .about .grid { grid-template-columns: 1fr; gap: 36px; } }\n\n  /* \u2500\u2500 Campaigns \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .campaigns { border-top: 1px solid var(--line); background: var(--bg-1); }\n  .camp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }\n  .camp {\n    background: var(--bg); border: 1px solid var(--line); border-radius: 14px;\n    padding: 30px 30px 34px; transition: border-color .18s, transform .18s, background .18s;\n    position: relative; overflow: hidden;\n  }\n  .camp:hover { border-color: rgba(255,58,63,.45); transform: translateY(-4px); }\n  .camp .no { font-family: var(--mono); font-size: 13px; color: var(--red); letter-spacing: .14em; }\n  .camp h3 { font-family: var(--display); font-weight: 700; font-size: 25px; line-height: 1.1; margin: 18px 0 12px; letter-spacing: -0.01em; }\n  .camp p { font-size: 16px; line-height: 1.5; color: var(--ink-dim); margin: 0; }\n  .camp .metric { margin-top: 22px; font-family: var(--mono); font-size: 13px; letter-spacing: .06em; color: var(--ink-mut); text-transform: uppercase; }\n  .camp .metric b { color: var(--teal); }\n  @media (max-width: 900px) { .camp-grid { grid-template-columns: 1fr; } }\n\n  /* \u2500\u2500 Crisis (every product deserves a crisis) \u2500\u2500 */\n  .crisis { border-top: 1px solid var(--line); }\n  .crisis .inner { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 64px; align-items: center; }\n  .crisis h2 { font-size: clamp(32px, 4.4vw, 56px); }\n  .crisis .body { font-size: 21px; line-height: 1.6; color: var(--ink-dim); }\n  .crisis .body strong { color: var(--ink); font-weight: 600; }\n  .chips { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }\n  .chip {\n    font-family: var(--mono); font-size: 15px; color: var(--ink);\n    border: 1px solid var(--line-2); border-radius: 999px; padding: 11px 18px;\n    transition: border-color .15s, color .15s, background .15s; cursor: default;\n  }\n  .chip:hover { border-color: var(--red); color: #fff; background: rgba(255,58,63,.12); }\n  @media (max-width: 900px) { .crisis .inner { grid-template-columns: 1fr; gap: 36px; } }\n\n  /* \u2500\u2500 Motto \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .motto { border-top: 1px solid var(--line); text-align: center; }\n  .motto .q {\n    font-family: var(--display); font-weight: 800; letter-spacing: -0.02em;\n    font-size: clamp(32px, 5.2vw, 70px); line-height: 1.06; max-width: 20ch; margin: 0 auto;\n  }\n  .motto .mark { font-size: 90px; line-height: .4; color: var(--red); font-family: var(--display); }\n\n  /* \u2500\u2500 Services \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .services { border-top: 1px solid var(--line); background: var(--bg-1); }\n  .svc-list { border-top: 1px solid var(--line); }\n  .svc {\n    display: grid; grid-template-columns: 90px 1fr auto; gap: 32px; align-items: center;\n    padding: 30px 8px; border-bottom: 1px solid var(--line);\n    transition: background .18s, padding-left .18s; cursor: default;\n  }\n  .svc:hover { background: rgba(255,58,63,.05); padding-left: 22px; }\n  .svc .no { font-family: var(--mono); font-size: 15px; color: var(--ink-mut); letter-spacing: .1em; }\n  .svc:hover .no { color: var(--red); }\n  .svc h3 { font-family: var(--display); font-weight: 700; font-size: clamp(22px, 2.6vw, 32px); margin: 0; letter-spacing: -0.01em; }\n  .svc .tag { font-family: var(--mono); font-size: 13px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-mut); }\n  @media (max-width: 760px) {\n    .svc { grid-template-columns: 56px 1fr; }\n    .svc .tag { display: none; }\n  }\n\n  /* \u2500\u2500 Closing CTA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .closing { border-top: 1px solid var(--line); text-align: center; overflow: hidden; }\n  .closing::after {\n    content:\"\"; position:absolute; bottom:-400px; left:50%; transform:translateX(-50%);\n    width:1100px; height:1100px; border-radius:50%;\n    background: radial-gradient(circle, rgba(255,58,63,.16), transparent 60%); pointer-events:none; z-index:0;\n  }\n  .closing h2 { font-size: clamp(34px, 5vw, 66px); max-width: 24ch; margin: 24px auto 0; }\n  .closing .cta-row { margin-top: 48px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }\n\n  /* \u2500\u2500 Footer \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  footer { border-top: 1px solid var(--line); padding: 56px 0 48px; }\n  footer .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 40px; flex-wrap: wrap; }\n  footer .disc { font-size: 14px; line-height: 1.6; color: var(--ink-mut); max-width: 56ch; margin: 28px 0 0; }\n  footer .legal { font-family: var(--mono); font-size: 12px; letter-spacing: .08em; color: var(--ink-mut); text-transform: uppercase; }\n  footer .contact { font-family: var(--mono); font-size: 14px; color: var(--ink-dim); text-align: right; }\n  footer .contact a:hover { color: var(--red); }\n\n  /* \u2500\u2500 Reveal \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s cubic-bezier(.2,.7,.3,1), transform .7s cubic-bezier(.2,.7,.3,1); }\n  .reveal.in { opacity: 1; transform: none; }\n  @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; } }\n\n  /* clock */\n  .ddclock { width: 100%; height: 100%; overflow: visible; }\n  .ddclock-sec { animation: sweep 60s linear infinite; transform-box: view-box; }\n  @keyframes sweep { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }\n  @media (prefers-reduced-motion: reduce) { .ddclock-sec { animation: none; } }\n\n  /* \u2500\u2500 No-Emergency Services \u2500\u2500 */\n  .no-emergency { border-top: 1px solid var(--line); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<nav>\n  <div class=\"wrap\">\n    <a class=\"logo\" href=\"#top\" aria-label=\"Doomsday PR home\">\n      <svg viewBox=\"0 0 40 40\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n        <circle cx=\"20\" cy=\"20\" r=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><\u002Fcircle>\n        <line x1=\"20\" y1=\"20\" x2=\"20\" y2=\"8.5\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fline>\n        <line x1=\"20\" y1=\"20\" x2=\"13.5\" y2=\"13\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fline>\n        <circle cx=\"20\" cy=\"20\" r=\"2.6\" fill=\"var(--red)\"><\u002Fcircle>\n        <circle cx=\"20\" cy=\"3.2\" r=\"2.4\" fill=\"var(--red)\"><\u002Fcircle>\n      <\u002Fsvg>\n      <span class=\"word\">DOOMSDAY<span class=\"pr\">PR<\u002Fspan><\u002Fspan>\n    <\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#campaigns\">Campaigns<\u002Fa>\n      <a href=\"#crisis\">Approach<\u002Fa>\n      <a href=\"#services\">Services<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:24px;\">\n      <span class=\"threat\"><span class=\"dot\"><\u002Fspan>Threat level: severe<\u002Fspan>\n      <a class=\"btn\" href=\"#contact\">Start a crisis<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 HERO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<header class=\"hero gridbg\" id=\"top\">\n  <div class=\"wrap inner\">\n    <div>\n      <div class=\"mono-label reveal\">Fear-forward communications<\u002Fdiv>\n      <h1 class=\"display reveal\" style=\"margin-top:26px;\">We don't create panic.<br><em class=\"hot\">We brand it.<\u002Fem><\u002Fh1>\n      <p class=\"sub reveal\">The world's leading fear-forward communications agency - specializing in turning mild public confusion into full-scale existential dread.<\u002Fp>\n      <div class=\"cta-row reveal\">\n        <a class=\"btn\" href=\"#contact\">Engineer my apocalypse<\u002Fa>\n        <a class=\"btn ghost\" href=\"#campaigns\">See the panic portfolio<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-clock reveal\" id=\"heroClock\" aria-hidden=\"true\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 NEWS CRAWL \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"crawl\" aria-hidden=\"true\">\n  <div class=\"track\" id=\"crawlTrack\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 ABOUT \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section class=\"about gridbg\" id=\"about\">\n  <div class=\"wrap grid\">\n    <p class=\"lead reveal\">At Doomsday PR, we believe <em class=\"hot\">every product deserves a crisis.<\u002Fem><\u002Fp>\n    <div class=\"body reveal\">\n      <p style=\"margin-top:0;\">We are the agency the apocalypse calls when it needs better positioning. For two decades we've helped brands stop competing on features and start competing on <strong>impending doom.<\u002Fstrong><\u002Fp>\n      <p>Our methodology is simple, repeatable, and deeply irresponsible: identify a latent fear, amplify it past the point of reason, then gently place your product between the customer and the abyss.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 CAMPAIGNS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section class=\"campaigns gridbg\" id=\"campaigns\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <span class=\"mono-label\">Award-winning campaigns<\u002Fspan>\n      <h2 class=\"display\">Selected works from the panic portfolio<\u002Fh2>\n      <p>A representative sample of dread we've successfully monetized. References available; sanity not included.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"camp-grid\">\n      <article class=\"camp reveal\">\n        <div class=\"no\">CASE 01<\u002Fdiv>\n        <h3>Global Worming<\u002Fh3>\n        <p>Repositioned a minor gardening anxiety into a planet-scale threat. The worms are coming. They were always coming.<\u002Fp>\n        <div class=\"metric\">Reach <b>2.1B<\u002Fb> \u00b7 Dread index <b>+340%<\u002Fb><\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"camp reveal\">\n        <div class=\"no\">CASE 02<\u002Fdiv>\n        <h3>COVID Panic Extensions\u2122<\u002Fh3>\n        <p>A subscription model for residual unease. When the original crisis fades, we keep the engagement warm.<\u002Fp>\n        <div class=\"metric\">Renewal rate <b>94%<\u002Fb> \u00b7 Calm <b>\u221288%<\u002Fb><\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"camp reveal\">\n        <div class=\"no\">CASE 03<\u002Fdiv>\n        <h3>5G Brain-Melt Narratives<\u002Fh3>\n        <p>Turned faster downloads into a neurological emergency. Now with seamless 6G-readiness for future anxieties.<\u002Fp>\n        <div class=\"metric\">Tinfoil sold <b>1.4M m\u00b2<\u002Fb><\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"camp reveal\">\n        <div class=\"no\">CASE 04<\u002Fdiv>\n        <h3>UFO Disclosure Teasers<\u002Fh3>\n        <p>Eternal \"coming soon.\" The disclosure never arrives, but the newsletter open rate is genuinely out of this world.<\u002Fp>\n        <div class=\"metric\">Believers <b>+18M<\u002Fb> \u00b7 Proof <b>0<\u002Fb><\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"camp reveal\">\n        <div class=\"no\">CASE 05<\u002Fdiv>\n        <h3>Suspiciously Organized Spiders<\u002Fh3>\n        <p>They're not just in your house. They're <em class=\"hot\">coordinating.<\u002Fem> Our most requested engagement strategy.<\u002Fp>\n        <div class=\"metric\">Legs deployed <b>8 / unit<\u002Fb><\u002Fdiv>\n      <\u002Farticle>\n      <article class=\"camp reveal\">\n        <div class=\"no\">CASE 06<\u002Fdiv>\n        <h3>AI Will Replace Everything<\u002Fh3>\n        <p>Your toaster, your boss, and eventually your dog. Our flagship product line, fully automated and self-escalating.<\u002Fp>\n        <div class=\"metric\">Existential clicks <b>730M<\u002Fb><\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 CRISIS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section class=\"crisis gridbg\" id=\"crisis\">\n  <div class=\"wrap inner\">\n    <div class=\"reveal\">\n      <span class=\"mono-label\">Fear-based product positioning<\u002Fspan>\n      <h2 class=\"display\" style=\"margin-top:22px;\">Whatever you sell, we'll find the doom in it.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"reveal\">\n      <p class=\"body\">Whether you're selling <strong>supplements, bunkers, antivirus software, bottled air,<\u002Fstrong> or <strong>premium tinfoil hats,<\u002Fstrong> we craft the perfect apocalypse around your brand - bespoke, scalable, and emotionally non-negotiable.<\u002Fp>\n      <div class=\"chips\" style=\"margin-top:30px;\">\n        <span class=\"chip\">Supplements<\u002Fspan>\n        <span class=\"chip\">Bunkers<\u002Fspan>\n        <span class=\"chip\">Antivirus software<\u002Fspan>\n        <span class=\"chip\">Bottled air<\u002Fspan>\n        <span class=\"chip\">Premium tinfoil hats<\u002Fspan>\n        <span class=\"chip\">Your product here<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 MOTTO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section class=\"motto gridbg\">\n  <div class=\"wrap\">\n    <div class=\"mark reveal\">\"<\u002Fdiv>\n    <p class=\"q reveal\">Why inform the public when you can emotionally destabilize them into clicking <em class=\"hot\">\"Buy Now\"?<\u002Fem><\u002Fp>\n    <p class=\"reveal\" style=\"font-family:var(--mono); font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-mut); margin-top:36px;\">- Official company motto, unfortunately<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 SERVICES \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section class=\"services gridbg\" id=\"services\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <span class=\"mono-label\">Capabilities<\u002Fspan>\n      <h2 class=\"display\">Services engineered for maximum destabilization<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"svc-list\">\n      <div class=\"svc reveal\"><span class=\"no\">01<\u002Fspan><h3>Fear-based product positioning<\u002Fh3><span class=\"tag\">Strategy<\u002Fspan><\u002Fdiv>\n      <div class=\"svc reveal\"><span class=\"no\">02<\u002Fspan><h3>Conspiracy-adjacent storytelling<\u002Fh3><span class=\"tag\">Narrative<\u002Fspan><\u002Fdiv>\n      <div class=\"svc reveal\"><span class=\"no\">03<\u002Fspan><h3>End-of-the-world launch campaigns<\u002Fh3><span class=\"tag\">Go-to-market<\u002Fspan><\u002Fdiv>\n      <div class=\"svc reveal\"><span class=\"no\">04<\u002Fspan><h3>Spider-based engagement strategies<\u002Fh3><span class=\"tag\">Social<\u002Fspan><\u002Fdiv>\n      <div class=\"svc reveal\"><span class=\"no\">05<\u002Fspan><h3>UFO influencer outreach<\u002Fh3><span class=\"tag\">Partnerships<\u002Fspan><\u002Fdiv>\n      <div class=\"svc reveal\"><span class=\"no\">06<\u002Fspan><h3>AI panic optimization<\u002Fh3><span class=\"tag\">Performance<\u002Fspan><\u002Fdiv>\n      <div class=\"svc reveal\"><span class=\"no\">07<\u002Fspan><h3>5G-compatible anxiety funnels<\u002Fh3><span class=\"tag\">Conversion<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 NO-EMERGENCY SERVICES \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section class=\"no-emergency gridbg\" id=\"no-emergency\">\n  <div class=\"wrap\">\n    <div class=\"section-head reveal\">\n      <span class=\"mono-label\">For brands with no emergency<\u002Fspan>\n      <h2 class=\"display\">Services for Brands With No Emergency<\u002Fh2>\n      <p>If nothing is wrong, we will fix that.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"camp-grid\">\n      <article class=\"camp reveal\">\n        <div class=\"no\">01<\u002Fdiv>\n        <h3>Panic Naming<\u002Fh3>\n        <p>We rename normal things until they sound like they require a fast response team.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"camp reveal\">\n        <div class=\"no\">02<\u002Fdiv>\n        <h3>Fear Funnels<\u002Fh3>\n        <p>From \"Should I worry?\" to \"We all die soon.\"<\u002Fp>\n      <\u002Farticle>\n      <article class=\"camp reveal\">\n        <div class=\"no\">03<\u002Fdiv>\n        <h3>Expert Theatre<\u002Fh3>\n        <p>We provide people in lab coats who can point at charts with grave concern.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"camp reveal\">\n        <div class=\"no\">04<\u002Fdiv>\n        <h3>Conspiracy Adjacent\u2122<\u002Fh3>\n        <p>Never say it. Merely imply it with a triangle and a clock.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"camp reveal\">\n        <div class=\"no\">05<\u002Fdiv>\n        <h3>AI Panic Optimization<\u002Fh3>\n        <p>A/B tests - which killer bot is most likely to make your audience buy.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 CLOSING CTA \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section class=\"closing gridbg\" id=\"contact\">\n  <div class=\"wrap\">\n    <span class=\"mono-label reveal\" style=\"justify-content:center;\">The end is a marketing opportunity<\u002Fspan>\n    <h2 class=\"display reveal\">Because nothing moves inventory like the collapse of civilization.<\u002Fh2>\n    <div class=\"cta-row reveal\">\n      <a class=\"btn\" href=\"mailto:hello@doomsday.pr\">Book a doom audit<\u002Fa>\n      <a class=\"btn ghost\" href=\"#campaigns\">Review the portfolio<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 FOOTER \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"row\">\n      <div>\n        <a class=\"logo\" href=\"#top\">\n          <svg viewBox=\"0 0 40 40\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\">\n            <circle cx=\"20\" cy=\"20\" r=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><\u002Fcircle>\n            <line x1=\"20\" y1=\"20\" x2=\"20\" y2=\"8.5\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"20\" y1=\"20\" x2=\"13.5\" y2=\"13\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fline>\n            <circle cx=\"20\" cy=\"20\" r=\"2.6\" fill=\"var(--red)\"><\u002Fcircle>\n            <circle cx=\"20\" cy=\"3.2\" r=\"2.4\" fill=\"var(--red)\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span class=\"word\">DOOMSDAY<span class=\"pr\">PR<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n        <p class=\"disc\">Doomsday PR<\u002Fp>\n        <p class=\"legal\" style=\"margin-top:24px;\">\u00a9 2026 Doomsday PR - All fears reserved.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"contact\">\n        <div style=\"color:var(--ink); font-size:16px; margin-bottom:10px;\">Start a crisis<\u002Fdiv>\n        <a href=\"mailto:hello@doomsday.pr\">hello@doomsday.pr<\u002Fa><br>\n        <span>doomsday.pr<\u002Fspan><br><br>\n        <span style=\"color:var(--ink-mut);\">Bunker 4, Sub-Level 9<br>Undisclosed Location<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // \u2500\u2500 Animated doomsday clock (hero) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  (function () {\n    const cx = 300, cy = 300, R = 250;\n    const polar = (ang, r) => { const t = (ang-90)*Math.PI/180; return [cx+r*Math.cos(t), cy+r*Math.sin(t)]; };\n    let ticks = '';\n    for (let i=0;i<60;i++){\n      const hour = i%5===0, inFinal = i>=56 || i===0;\n      const [x1,y1]=polar(i*6,R), [x2,y2]=polar(i*6,R-(hour?26:13));\n      const col = inFinal ? 'var(--red)' : (hour ? 'rgba(236,238,240,.55)' : 'rgba(236,238,240,.20)');\n      ticks += `<line x1=\"${x1.toFixed(1)}\" y1=\"${y1.toFixed(1)}\" x2=\"${x2.toFixed(1)}\" y2=\"${y2.toFixed(1)}\" stroke=\"${col}\" stroke-width=\"${inFinal?5:(hour?4:2)}\" stroke-linecap=\"round\"/>`;\n    }\n    const [ax,ay]=polar(56*6,R+16), [bx,by]=polar(60*6,R+16);\n    const arc = `<path d=\"M ${ax.toFixed(1)} ${ay.toFixed(1)} A ${R+16} ${R+16} 0 0 1 ${bx.toFixed(1)} ${by.toFixed(1)}\" fill=\"none\" stroke=\"var(--red)\" stroke-width=\"6\" stroke-linecap=\"round\"/>`;\n    const [mx,my]=polar(0,R+30);\n    const midnight = `<polygon points=\"${mx},${(my-2).toFixed(1)} ${(mx-11).toFixed(1)},${(my-20).toFixed(1)} ${(mx+11).toFixed(1)},${(my-20).toFixed(1)}\" fill=\"var(--red)\"/>`;\n    const [hx,hy]=polar((11+56/60)*30, R-110);\n    const [nx,ny]=polar(56*6, R-55);\n    const svg = `\n<svg class=\"ddclock\" viewBox=\"0 0 600 600\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Doomsday clock at 23:56\">\n  <defs><radialGradient id=\"g\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n    <stop offset=\"0%\" stop-color=\"var(--red)\" stop-opacity=\"0.18\"/>\n    <stop offset=\"60%\" stop-color=\"var(--red)\" stop-opacity=\"0.05\"/>\n    <stop offset=\"100%\" stop-color=\"var(--red)\" stop-opacity=\"0\"/>\n  <\u002FradialGradient><\u002Fdefs>\n  <circle cx=\"${cx}\" cy=\"${cy}\" r=\"${R+60}\" fill=\"url(#g)\"/>\n  <circle cx=\"${cx}\" cy=\"${cy}\" r=\"${R+8}\" fill=\"none\" stroke=\"rgba(236,238,240,.12)\" stroke-width=\"2\"/>\n  <circle cx=\"${cx}\" cy=\"${cy}\" r=\"${R-46}\" fill=\"none\" stroke=\"rgba(236,238,240,.06)\" stroke-width=\"1\"/>\n  ${ticks}${arc}${midnight}\n  <line x1=\"${cx}\" y1=\"${cy}\" x2=\"${hx.toFixed(1)}\" y2=\"${hy.toFixed(1)}\" stroke=\"var(--ink)\" stroke-width=\"11\" stroke-linecap=\"round\"/>\n  <line x1=\"${cx}\" y1=\"${cy}\" x2=\"${nx.toFixed(1)}\" y2=\"${ny.toFixed(1)}\" stroke=\"var(--ink)\" stroke-width=\"7\" stroke-linecap=\"round\"/>\n  <g class=\"ddclock-sec\" style=\"transform-origin:${cx}px ${cy}px\">\n    <line x1=\"${cx}\" y1=\"${cy+34}\" x2=\"${cx}\" y2=\"${cy-205}\" stroke=\"var(--red)\" stroke-width=\"3\" stroke-linecap=\"round\"/>\n    <circle cx=\"${cx}\" cy=\"${cy-205}\" r=\"6\" fill=\"var(--red)\"/>\n  <\u002Fg>\n  <circle cx=\"${cx}\" cy=\"${cy}\" r=\"13\" fill=\"var(--ink)\"/>\n  <circle cx=\"${cx}\" cy=\"${cy}\" r=\"6\" fill=\"var(--red)\"/>\n<\u002Fsvg>`;\n    const el = document.getElementById('heroClock');\n    if (el) el.innerHTML = svg;\n  })();\n\n  // \u2500\u2500 News crawl content \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  (function () {\n    const items = [\n      ['BREAKING', 'the spiders are coordinating'],\n      ['ALERT', '5G now 20% more sentient'],\n      ['DEVELOPING', 'your toaster has filed for your job'],\n      ['EXCLUSIVE', 'UFO disclosure delayed until engagement peaks'],\n      ['URGENT', 'bottled air futures hit all-time high'],\n      ['ADVISORY', 'global worming enters phase nine'],\n      ['UPDATE', 'tinfoil shortage declared a lifestyle'],\n      ['WARNING', 'civilization collapse: great for Q4'],\n    ];\n    const block = items.map(([k,v]) => `<span class=\"item\"><b>${k}<\u002Fb>&nbsp;&nbsp;${v}<\u002Fspan><span class=\"item sep\">\u2736<\u002Fspan>`).join('');\n    const track = document.getElementById('crawlTrack');\n    track.innerHTML = block + block; // duplicate for seamless loop\n  })();\n\n  // \u2500\u2500 Scroll reveal (IO as progressive enhancement, with robust fallback) \u2500\u2500\n  (function () {\n    const els = [...document.querySelectorAll('.reveal')];\n    const revealAll = () => els.forEach(e => e.classList.add('in'));\n\n    // Failsafe: if IO is missing OR simply never fires in this environment,\n    // everything must still resolve to visible. Reveal on load + a timeout.\n    let ioFired = false;\n    window.addEventListener('load', () => { setTimeout(() => { if (!ioFired) revealAll(); }, 400); });\n    setTimeout(() => { if (!ioFired) revealAll(); }, 1200);\n\n    if (!('IntersectionObserver' in window)) { revealAll(); return; }\n\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          ioFired = true;\n          const sibs = [...e.target.parentElement.querySelectorAll(':scope > .reveal')];\n          const idx = sibs.indexOf(e.target);\n          e.target.style.transitionDelay = (Math.max(0, idx) * 0.06) + 's';\n          e.target.classList.add('in');\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.14, rootMargin: '0px 0px -8% 0px' });\n    els.forEach(e => io.observe(e));\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
